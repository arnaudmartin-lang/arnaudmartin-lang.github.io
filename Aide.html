<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aide</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #134459;
            color: white;
            padding: 20px 0;
            text-align: center;
        }

        h3 {
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .button {
            background-color: #8C7966;
            border-radius: 7px;
            color: black;
            padding: 15px 32px;
            font-size: 16px;
            margin: 20px;
            cursor: pointer;
            border: 2px solid black;
            text-decoration: none;
            display: inline-block;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            background: #f2f2f2;
            padding: 15px 0;
        }
    </style>
</head>

<body>

<header>
    <h1>Aide</h1>
</header>

<div class="container">

    <h3>
        Firefox (navigateur web) : permet d’accéder aux différents sites utilisés pendant les défis.<br><br>

        dCode : site permettant de décoder des messages.<br><br>

        MD5Decrypt : outil permettant de décrypter des hachages MD5.<br><br>
    </h3>

    <a href="#" class="button">Page d’accueil</a>

</div>

</body>
</html>
