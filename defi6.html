<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Défi</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #134459;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h3 {
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        img {
            border: 3px solid black;
            border-radius: 20px;
            max-width: 400px;
            height: auto;
        }

        video {
            border-radius: 12px;
            border: 3px solid #333;
            max-width: 800px;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #f2f2f2;
            padding: 15px;
        }

        .btn {
            background-color: #8C7966;
            border-radius: 7px;
            color: black;
            padding: 10px 20px;
            text-decoration: none;
            border: 2px solid black;
        }

        .btn:hover {
            background-color: #a08b75;
        }
    </style>
</head>

<body>

<header>
    <h1>Défi</h1>
</header>

<h3>
    TEXTE ICI
</h3>

<div class="container">

    <img src="image.jpg" alt="image du défi">

    </video>

</div>
